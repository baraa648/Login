<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حجزك بضغطة زر</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 10px; /* إضافة مسافة للحواف */
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(15px); 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            color: white; 
        }

        h2 { margin-bottom: 20px; font-size: 1.5rem; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 15px; 
            box-sizing: border-box; /* لمنع خروج الـ input عن حدود البطاقة */
            background: rgba(255,255,255,0.2); 
            color: white; 
            font-size: 16px; /* حجم خط مناسب للموبايل لمنع الزووم التلقائي */
            outline: none; 
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background: #ffffff; 
            color: #764ba2; 
            border: none; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 15px; 
        }
        
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h2>✨ حجز الخدمة</h2>
        <input type="text" id="name" placeholder="الاسم الكريم">
        <input type="number" id="phone" placeholder="رقم الهاتف (مثل 01012345678)">
        <button onclick="submitOrder()">تأكيد الطلب</button>
    </div>

    <script>
        function submitOrder() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;

            // التحقق (مصر 11 رقم، السعودية 10 أرقام)
            const isEgypt = /^01[0-25]\d{8}$/.test(phone);
            const isKSA = /^05\d{8}$/.test(phone);

            if (!isEgypt && !isKSA) { alert("❌ الرقم غير صحيح! تأكد من مفتاح الدولة."); return; }
            if (localStorage.getItem(phone)) { alert("⚠️ هذا الرقم سجل من قبل!"); return; }

            const msg = `🚀 *طلب جديد*%0A👤 *الاسم:* ${name}%0A📱 *الهاتف:* ${phone}%0A🌍 *المصدر:* موقع الموبايل`;
            
            fetch(`https://api.telegram.org/bot8903499642:AAF7pr2pgezLcHuoGs2p9BIOzv5Sk65TpUM/sendMessage?chat_id=8827840980&text=${msg}&parse_mode=Markdown`)
            .then(res => { if(res.ok) { localStorage.setItem(phone, "done"); alert("✅ تم وصول طلبك بنجاح!"); } });
        }
    </script>
</body>
</html>
