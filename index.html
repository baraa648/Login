<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمات الفخامة | حجز سريع</title>
    <style>
        body { font-family: 'Segoe UI', Cairo, sans-serif; background: #050505; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; padding: 40px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid #d4af37; border-radius: 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h2 { color: #d4af37; margin-bottom: 30px; font-size: 26px; }
        input { width: 100%; padding: 18px; margin: 10px 0; border: 1px solid #333; border-radius: 15px; background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 18px; margin-top: 20px; background: #d4af37; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b8962c; transform: translateY(-2px); }
        #msg { margin-top: 25px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>✨ حجز الخدمة</h2>
        <form id="bookingForm">
            <input type="text" id="name" placeholder="👤 اسمك الكريم" required>
            <input type="tel" id="phone" placeholder="📱 رقم الهاتف (010...)" required>
            <button type="submit" id="submitBtn">تأكيد الحجز</button>
        </form>
        <div id="msg"></div>
    </div>

    <script>
        document.getElementById("bookingForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            const data = { name: document.getElementById("name").value.trim(), phone: document.getElementById("phone").value.trim() };
            btn.disabled = true; btn.innerText = "⏳ جاري المعالجة...";
            try {
                const res = await fetch("https://young-scene-bd39.sniber489.workers.dev/", {
                    method: 'POST', body: JSON.stringify(data)
                });
                if (res.status === 400) alert("❌ رقم الهاتف غير صحيح!");
                else if (res.status === 403) alert("⚠️ هذا الرقم سجل مسبقاً!");
                else if (res.ok) alert("✅ تم طلبك بنجاح! سنتواصل معك.");
            } catch { alert("خطأ في الاتصال!"); }
            finally { btn.disabled = false; btn.innerText = "تأكيد الحجز"; }
        });
    </script>
</body>
</html>
