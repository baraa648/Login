<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز الفخامة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #0a0a0a; /* خلفية سوداء */
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid #d4af37; /* إطار ذهبي */
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            width: 90%; max-width: 400px; text-align: center; color: #d4af37; 
        }

        h2 { font-size: 1.8rem; margin-bottom: 20px; }

        input { 
            width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #d4af37; 
            border-radius: 12px; background: rgba(0,0,0,0.3); color: white; 
            font-size: 16px; outline: none; box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 15px; background: #d4af37; color: black; 
            border: none; border-radius: 12px; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.3s; margin-top: 15px; 
        }
        
        button:hover { background: #f1c40f; }

        .admin-btn { background: transparent; color: #555; font-size: 12px; margin-top: 20px; text-decoration: underline; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>✨ حجز الخدمة</h2>
        <input type="text" id="name" placeholder="الاسم الكريم">
        <input type="tel" id="phone" placeholder="010xxxxxxxx">
        <button onclick="submitOrder()">تأكيد الطلب</button>
        <button class="admin-btn" onclick="clearData()">مسح جميع السجلات</button>
    </div>

    <script>
        async function submitOrder() {
            const name = document.getElementById('name').value;
            let phone = document.getElementById('phone').value;

            if (phone.startsWith("01")) { phone = "+2" + phone; }
            const isValid = /^\+201[0-25]\d{8}$/.test(phone) || /^05\d{8}$/.test(phone);

            if (!isValid) { alert("❌ رقم غير صحيح!"); return; }
            if (localStorage.getItem(phone)) { alert("⚠️ الرقم مسجل مسبقاً!"); return; }

            const msg = `🚀 *طلب جديد*%0A👤 *الاسم:* ${name}%0A📱 *الهاتف:* ${phone}`;
            const whatsappLink = `https://wa.me/${phone.replace('+', '')}`;
            const keyboard = JSON.stringify({
                inline_keyboard: [[{ text: "💬 مراسلة العميل واتساب", url: whatsappLink }]]
            });

            const url = `https://api.telegram.org/bot8903499642:AAF7pr2pgezLcHuoGs2p9BIOzv5Sk65TpUM/sendMessage?chat_id=8827840980&text=${encodeURIComponent(msg)}&parse_mode=Markdown&reply_markup=${encodeURIComponent(keyboard)}`;

            const res = await fetch(url);
            if(res.ok) {
                localStorage.setItem(phone, "done");
                alert("✅ تم إرسال الطلب!");
            }
        }

        // دالة مسح السجلات
        function clearData() {
            if(confirm("هل أنت متأكد؟ سيتم مسح كافة الأرقام المسجلة محلياً.")) {
                localStorage.clear();
                alert("✅ تم المسح بنجاح!");
            }
        }
    </script>
</body>
</html>
