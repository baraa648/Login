<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحجز الذكي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 95%; padding: 10px; background: #0088cc; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>حجز جديد</h2>
        <input type="text" id="name" placeholder="الاسم" required>
        <input type="text" id="phone" placeholder="رقم الهاتف" required>
        <button onclick="sendToTelegram()">إرسال الطلب</button>
    </div>

    <script>
        async function sendToTelegram() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            
            // تحقق بسيط من الرقم
            if(!phone.startsWith("01")) { alert("الرقم يجب أن يبدأ بـ 01"); return; }

            const token = "8903499642:AAF7pr2pgezLcHuoGs2p9BIOzv5Sk65TpUM";
            const chatId = "8827840980";
            const text = `طلب حجز جديد:%0Aالاسم: ${name}%0Aالرقم: ${phone}`;

            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${text}`;

            const res = await fetch(url);
            if(res.ok) alert("تم الحجز بنجاح!");
            else alert("حدث خطأ، تأكد من البيانات.");
        }
    </script>
</body>
</html>
