<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز الفخامة | الحجز السريع</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: radial-gradient(circle at top, #2d2d2d, #090909); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; color: #d4af37; padding: 20px; }
        .card { animation: show .6s ease; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; border: 1px solid #d4af37; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        @keyframes show { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: none; } }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #d4af37; border-radius: 12px; background: rgba(0,0,0,0.3); color: white; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,.3); }
        button { width: 100%; padding: 15px; background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b); color: black; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; box-shadow: 0 0 25px rgba(212,175,55,.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #msgBox { margin-top: 15px; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>✨ حجز الخدمة</h2>
        <form id="bookingForm">
            <input type="text" id="name" placeholder="👤 الاسم الكريم" required autocomplete="name">
            <input type="tel" id="phone" placeholder="📱 010xxxxxxxx" required inputmode="numeric" maxlength="11" autocomplete="tel">
            <button type="submit" id="submitBtn">تأكيد الطلب</button>
        </form>
        <div id="msgBox"></div>
    </div>

    <script>
        const btn = document.getElementById("submitBtn");
        const msgBox = document.getElementById("msgBox");

        document.getElementById("bookingForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("name").value.trim();
            const phone = document.getElementById("phone").value.trim();

            // نظام الأدمن السري (للمسح)
            if (name === "admin" && phone === "01061704158") {
                if (confirm("⚠️ هل تريد مسح كافة السجلات؟")) { localStorage.clear(); alert("✅ تم المسح."); }
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "⏳ جارٍ الإرسال...";

            try {
                const response = await fetch("https://young-scene-bd39.sniber489.workers.dev/", {
                    method: 'POST',
                    body: JSON.stringify({ name, phone })
                });

                if(response.ok) {
                    msgBox.innerHTML = "<span style='color:green'>✅ تم الحجز بنجاح!</span>";
                } else {
                    throw new Error();
                }
            } catch {
                msgBox.innerHTML = "<span style='color:red'>خطأ في الإرسال، حاول لاحقاً.</span>";
            } finally {
                btn.disabled = false;
                btn.innerHTML = "تأكيد الطلب";
            }
        });
    </script>
</body>
</html>
