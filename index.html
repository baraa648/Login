<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمات الفخامة | الحجز الفاخر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-dark: #aa8c00; }
        body { font-family: 'Cairo', sans-serif; background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: #fff; }
        
        /* الخلفية والنجوم */
        .orb { position: absolute; width: 300px; height: 300px; background: var(--gold); filter: blur(150px); opacity: 0.15; border-radius: 50%; animation: move 10s infinite alternate; }
        @keyframes move { from { transform: translate(-200px, -200px); } to { transform: translate(200px, 200px); } }

        .card { position: relative; width: 90%; max-width: 400px; padding: 40px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 40px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); transition: 0.5s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }

        h2 { color: var(--gold); font-size: 28px; margin-bottom: 30px; }
        input { width: 100%; padding: 20px; margin: 12px 0; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; outline: none; transition: 0.4s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.3); }

        button { width: 100%; padding: 20px; margin-top: 20px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border: none; border-radius: 20px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.4s; overflow: hidden; position: relative; }
        button:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* نظام الإشعارات */
        #notification { position: fixed; top: 20px; padding: 15px 30px; border-radius: 15px; display: none; z-index: 100; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="orb"></div>
    <div class="card">
        <h2>✨ حجز الخدمة الفاخرة</h2>
        <form id="bookingForm">
            <input type="text" id="name" placeholder="👤 اسمك الكريم" required>
            <input type="tel" id="phone" placeholder="📱 رقم الهاتف" required>
            <button type="submit" id="submitBtn">تأكيد الحجز</button>
        </form>
    </div>
    <div id="notification"></div>

    <script>
        const notify = (msg, color) => {
            const n = document.getElementById("notification");
            n.innerText = msg; n.style.background = color; n.style.display = "block";
            setTimeout(() => n.style.display = "none", 3500);
        };

        document.getElementById("bookingForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            const data = { name: document.getElementById("name").value.trim(), phone: document.getElementById("phone").value.trim() };
            
            btn.disabled = true; btn.innerText = "⏳ جاري المعالجة...";
            try {
                const res = await fetch("https://young-scene-bd39.sniber489.workers.dev/", {
                    method: 'POST', body: JSON.stringify(data)
                });
                if (res.status === 400) notify("❌ رقم الهاتف غير صحيح!", "#d32f2f");
                else if (res.status === 403) notify("⚠️ هذا الرقم سجل مسبقاً!", "#fbc02d");
                else if (res.ok) notify("✅ تم طلبك بنجاح! سنتواصل معك.", "#388e3c");
            } catch { notify("❌ خطأ في الاتصال بالسيرفر", "#d32f2f"); }
            finally { btn.disabled = false; btn.innerText = "تأكيد الحجز"; }
        });
    </script>
</body>
</html>
