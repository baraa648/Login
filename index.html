<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حجز الفخامة</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #d4af37; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 30px; border: 1px solid #d4af37; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #d4af37; border-radius: 12px; background: rgba(0,0,0,0.3); color: white; outline: none; }
        button { width: 100%; padding: 15px; background: #d4af37; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: black; }
    </style>
</head>
<body>
    <div class="card">
        <h2>✨ حجز الخدمة</h2>
        <form id="bookingForm">
            <input type="text" id="name" placeholder="👤 الاسم" required>
            <input type="tel" id="phone" placeholder="📱 الرقم (010xxxxxxxx)" required>
            <button type="submit" id="submitBtn">تأكيد الطلب</button>
        </form>
    </div>

    <script>
        document.getElementById("bookingForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            const data = { name: document.getElementById("name").value.trim(), phone: document.getElementById("phone").value.trim() };
            
            btn.disabled = true; 
            btn.innerHTML = "⏳ جارٍ الإرسال...";
            
            try {
                // استبدل الرابط أدناه برابط الـ Worker الخاص بك
                const res = await fetch("https://young-scene-bd39.sniber489.workers.dev/", {
                    method: 'POST', body: JSON.stringify(data)
                });
                
                const result = await res.json().catch(() => ({}));
                if (result.status === "admin_trigger") { alert("✅ تم مسح سجلات التكرار!"); location.reload(); }
                else if (res.status === 403) { alert("⚠️ هذا الرقم سجل مسبقاً!"); }
                else if (res.ok) { alert("✅ تم الحجز بنجاح!"); }
            } catch { alert("خطأ في الاتصال!"); }
            finally { btn.disabled = false; btn.innerHTML = "تأكيد الطلب"; }
        });
    </script>
</body>
</html>
