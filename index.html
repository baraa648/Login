<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>احجز مكانك الآن</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 20px; color: #38bdf8; }
        input { width: 90%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; background: #334155; color: white; }
        button { width: 100%; padding: 15px; margin-top: 10px; background: #0ea5e9; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0284c7; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 احجز طلبك الآن</h2>
        <input type="text" id="name" placeholder="👤 اسمك الكريم">
        <input type="text" id="phone" placeholder="📱 رقم الهاتف (بدولتك)">
        <button onclick="submitOrder()">إتمام الحجز</button>
    </div>

    <script>
        // تخزين الأرقام محلياً لمنع السبام (localStorage)
        function submitOrder() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;

            // 1. فلترة أرقام الدول (مصر، السعودية، الإمارات، الأردن، الكويت)
            const phoneRegex = /^(01|05|09|07|966|971)\d{7,9}$/;
            if (!phoneRegex.test(phone)) { alert("❌ يرجى إدخال رقم هاتف صحيح"); return; }

            // 2. منع السبام
            if (localStorage.getItem(phone)) { alert("⚠️ هذا الرقم سجل طلب مسبقاً!"); return; }

            // 3. تنسيق رسالة التليجرام
            const msg = `🌟 *طلب حجز جديد*%0A👤 *الاسم:* ${name}%0A📱 *الهاتف:* ${phone}%0A⏰ *الوقت:* ${new Date().toLocaleString()}`;

            fetch(`https://api.telegram.org/bot8903499642:AAF7pr2pgezLcHuoGs2p9BIOzv5Sk65TpUM/sendMessage?chat_id=8827840980&text=${msg}&parse_mode=Markdown`)
            .then(res => {
                if(res.ok) {
                    localStorage.setItem(phone, "booked"); // حفظ الرقم لمنع تكراره
                    alert("✅ تم الحجز بنجاح!");
                }
            });
        }
    </script>
</body>
</html>
